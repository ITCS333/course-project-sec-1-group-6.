<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Board</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <header>
        <h1>General Discussion Board</h1>
    </header>

    <main>
        <section>
            <h2>Start a New Topic</h2>

            <form id="new-topic-form" action="#">
                <fieldset>
                    <legend>New Topic Details</legend>

                    <label for="topic-subject">Topic Subject</label>
                    <input id="topic-subject" type="text" required>

                    <label for="topic-message">Message</label>
                    <textarea id="topic-message" rows="6" required></textarea>

                    <button id="create-topic" type="submit">Create Topic</button>
                </fieldset>
            </form>
        </section>

        <section>
            <h2>All Topics</h2>

            <div id="topics-list">
                <article>
                    <h3>
                        <a href="topic.html?id=1">Question about CSS Flexbox</a>
                    </h3>
                    <footer>Posted by: Student Name on 2026-04-30</footer>
                    <div>
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </div>
                </article>

                <article>
                    <h3>
                        <a href="topic.html?id=2">How do PHP APIs return JSON?</a>
                    </h3>
                    <footer>Posted by: Student Name on 2026-04-30</footer>
                    <div>
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </div>
                </article>

                <article>
                    <h3>
                        <a href="topic.html?id=3">Help with MySQL connection</a>
                    </h3>
                    <footer>Posted by: Student Name on 2026-04-30</footer>
                    <div>
                        <button type="button">Edit</button>
                        <button type="button">Delete</button>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <script src="board.js"></script>
</body>
</html>
