 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Details</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <script src="topic.js" defer></script>
</head>
<body>

    <header>
        <h1 id="topic-subject"></h1>
        <p>Created by: Fatima Saleh</p>
    </header>

    <main>
        <article id="original-post">
            <p id="op-message"></p>

            <footer id="op-footer"></footer>

            <div id="topic-actions">
            </div>
        </article>

        <section id="replies-section">
            <h2>Replies</h2>

            <div id="reply-list-container">
            </div>

            <form id="reply-form" action="#">
                <fieldset>
                    <legend>Your Reply</legend>

                    <label for="new-reply">Reply</label>
                    <textarea id="new-reply" rows="6" required></textarea>

                    <button type="submit">Post Reply</button>
                </fieldset>
            </form>
        </section>
    </main>

</body>
</html>
