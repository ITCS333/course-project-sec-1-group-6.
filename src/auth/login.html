<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100 bg-light">

    <main class="w-100" style="max-width: 400px;">
        <section class="card shadow p-4">
            <h1 class="text-center mb-4">Welcome Back!</h1>

            <form id="login-form" action="#">
                <fieldset>
                    <legend>Secure Login</legend>

                    <label for="email" class="form-label mt-3">Email Address</label>
                    <input type="email" id="email" class="form-control" required>

                    <label for="password" class="form-label mt-3">Password</label>
                    <input type="password" id="password" class="form-control" required minlength="8">

                    <button type="submit" id="login" class="btn btn-primary w-100 mt-4">Log In</button>
                </fieldset>

                <div id="message-container" class="mt-3"></div>
            </form>
        </section>
    </main>

    <script src="login.js" defer></script>

</body>
</html>
