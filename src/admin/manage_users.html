<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="manage_users.js" defer></script>
</head>
<body class="container mt-4">

<header class="mb-4">
    <h1>Admin Portal</h1>
</header>

<main>

    <!-- Section 1: Password Management -->
    <section class="mb-5">
        <h2>Change Your Password</h2>

        <form action="#" id="password-form">
            <fieldset class="border p-3">
                <legend>Password Update</legend>

                <label for="current-password" class="form-label">Current Password</label>
                <input type="password" id="current-password" class="form-control mb-3" required>

                <label for="new-password" class="form-label">New Password</label>
                <input type="password" id="new-password" class="form-control mb-3" minlength="8" required>

                <label for="confirm-password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control mb-3" required>

                <button type="submit" id="change" class="btn btn-primary">
                    Update Password
                </button>
            </fieldset>
        </form>
    </section>


    <!-- Section 2: User Management -->
    <section>
        <h2>Manage Users</h2>

        <!-- Add New User -->
        <details class="mb-4">
            <summary class="fw-bold">Add New User</summary>

            <form action="#" id="add-user-form" class="mt-3">
                <fieldset class="border p-3">
                    <legend>New User Information</legend>

                    <label for="user-name" class="form-label">Full Name</label>
                    <input type="text" id="user-name" class="form-control mb-3" required>

                    <label for="user-email" class="form-label">Email</label>
                    <input type="email" id="user-email" class="form-control mb-3" required>

                    <label for="default-password" class="form-label">Default Password</label>
                    <input type="password" id="default-password" class="form-control mb-3" minlength="8" required>

                    <label for="is-admin" class="form-label">Role</label>
                    <select id="is-admin" class="form-select mb-3">
                        <option value="0">Student</option>
                        <option value="1">Admin</option>
                    </select>

                    <button type="submit" id="add" class="btn btn-success">
                        Add User
                    </button>
                </fieldset>
            </form>
        </details>


        <!-- Registered Users Table -->
        <h3>Registered Users</h3>

        <input
            type="text"
            id="search-input"
            class="form-control mb-3"
            placeholder="Search by name or email..."
        >

        <table id="user-table" class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Admin</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="user-table-body">
                <!-- Dynamic content from manage_users.js -->
            </tbody>
        </table>

    </section>

</main>

</body>
</html>
